name: Identifier Link Check

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "refs.bib"
      - "data/**"
      - "src/mtor_nexus/**"
      - "docs/**"

permissions:
  contents: read
  issues: write

jobs:
  identifier-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --locked
      - name: Validate DOIs via Crossref
        run: uv run python -m mtor_nexus.utils.doi_check --bibfile refs.bib --fail-on-broken
      - name: Validate UniProt accessions
        run: uv run python -m mtor_nexus.utils.uniprot_check --graph data/processed/mtor-graph.json
      - name: Validate PDB IDs
        run: uv run python -m mtor_nexus.utils.pdb_check --graph data/processed/mtor-graph.json
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Identifier link check failed";
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "citation"
            });
            if (!data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ["citation"],
                body: `The scheduled identifier link check failed. Inspect ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}.`
              });
            }
