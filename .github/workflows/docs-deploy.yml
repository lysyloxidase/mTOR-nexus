name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "CITATION.cff"
      - ".zenodo.json"
      - "codemeta.json"
      - "LICENSE"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-extras --locked
      - name: Attribute published documentation
        run: |
          git config user.name lysyloxidase
          git config user.email 230636274+lysyloxidase@users.noreply.github.com
      - run: uv run mkdocs gh-deploy --force
