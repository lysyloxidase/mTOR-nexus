name: Zenodo Publication Preflight

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - run: uv sync --all-extras --locked
      - name: Report production blockers without creating a deposition
        run: uv run python scripts/zenodo_release.py
