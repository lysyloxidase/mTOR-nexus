name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --all-extras --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest --cov=mtor_nexus.graph --cov=mtor_nexus.schema --cov=mtor_nexus.disease --cov=mtor_nexus.ingest.source_registry --cov=mtor_nexus.ingest.source_index --cov-fail-under=85
      - run: uv run python -m mtor_nexus.ingest.source_index
      - run: uv run python -m mtor_nexus.graph.build
      - run: uv run python -m mtor_nexus.graph.validate
      - run: uv run python -m mtor_nexus.disease.validate
      - run: uv run python -m mtor_nexus.drugs.validate
      - run: uv run python -m mtor_nexus.ai.validate
      - run: uv run python -m mtor_nexus.release.figures --check
      - run: uv run python scripts/independent_reproduction.py
      - run: uv run python -m mtor_nexus.release.readiness
      - run: git diff --exit-code -- data/processed data/release data/sources/source-index.json figures webapp/public/data
      - run: uv run python -m mtor_nexus.utils.codemeta_check
      - run: uv run cffconvert --validate
      - run: uv run mkdocs build --strict
      - run: docker compose up -d neo4j
      - run: |
          for attempt in $(seq 1 30); do
            if docker compose exec -T neo4j cypher-shell -u neo4j -p mtor-nexus-dev 'RETURN 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - run: MTOR_NEXUS_NEO4J_URI=bolt://localhost:7687 MTOR_NEXUS_NEO4J_PASSWORD=mtor-nexus-dev uv run pytest tests/integration/test_neo4j.py
      - if: always()
        run: docker compose down --volumes

  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run start &
      - run: npx wait-on http://localhost:3000
      - run: npm run lighthouse
